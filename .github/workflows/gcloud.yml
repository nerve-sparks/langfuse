name: Deploy Langfuse to Google Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_web:
        description: "Deploy web service"
        type: boolean
        default: true
      deploy_worker:
        description: "Deploy worker service"
        type: boolean
        default: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GAR_REGISTRY: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY || 'langfuse' }}
  WEB_IMAGE: langfuse-web
  WORKER_IMAGE: langfuse-worker

jobs:
  build-and-push-web:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_web)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - id: meta
        run: |
          IMAGE="${{ env.GAR_REGISTRY }}/${{ env.WEB_IMAGE }}"
          TAG="${GITHUB_SHA::8}"
          echo "image=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.GAR_REGISTRY }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.GAR_REGISTRY }}/${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_BUILD_ID=${{ github.sha }}

  build-and-push-worker:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_worker)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - id: meta
        run: |
          IMAGE="${{ env.GAR_REGISTRY }}/${{ env.WORKER_IMAGE }}"
          TAG="${GITHUB_SHA::8}"
          echo "image=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: |
            ${{ env.GAR_REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ github.sha }}
            ${{ env.GAR_REGISTRY }}/${{ env.WORKER_IMAGE }}:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          build-args: |
            NEXT_PUBLIC_BUILD_ID=${{ github.sha }}

  deploy-web:
    needs: build-and-push-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: langfuse-web
          region: ${{ env.REGION }}
          image: ${{ env.GAR_REGISTRY }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
          flags: >-
            --port=3000
            --cpu=2
            --memory=2Gi
            --min-instances=0
            --max-instances=10
            --concurrency=80
            --timeout=300
            --allow-unauthenticated
            --vpc-connector=${{ vars.VPC_CONNECTOR || '' }}
          env_vars: |
            NODE_ENV=production
            DOCKER_BUILD=0
            HOSTNAME=0.0.0.0
            PORT=3000
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            DIRECT_URL=DIRECT_URL:latest
            NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest
            NEXTAUTH_URL=NEXTAUTH_URL:latest
            SALT=SALT:latest
            ENCRYPTION_KEY=ENCRYPTION_KEY:latest
            CLICKHOUSE_URL=CLICKHOUSE_URL:latest
            CLICKHOUSE_MIGRATION_URL=CLICKHOUSE_MIGRATION_URL:latest
            CLICKHOUSE_USER=CLICKHOUSE_USER:latest
            CLICKHOUSE_PASSWORD=CLICKHOUSE_PASSWORD:latest
            REDIS_HOST=REDIS_HOST:latest
            REDIS_PORT=REDIS_PORT:latest
            REDIS_AUTH=REDIS_AUTH:latest
            LANGFUSE_S3_EVENT_UPLOAD_BUCKET=LANGFUSE_S3_EVENT_UPLOAD_BUCKET:latest
            LANGFUSE_S3_EVENT_UPLOAD_REGION=LANGFUSE_S3_EVENT_UPLOAD_REGION:latest
            LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID:latest
            LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY:latest
            LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT:latest
            LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=LANGFUSE_S3_MEDIA_UPLOAD_BUCKET:latest
            LANGFUSE_S3_MEDIA_UPLOAD_REGION=LANGFUSE_S3_MEDIA_UPLOAD_REGION:latest
            LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID:latest
            LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY:latest
            LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT:latest

  deploy-worker:
    needs: build-and-push-worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: langfuse-worker
          region: ${{ env.REGION }}
          image: ${{ env.GAR_REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ github.sha }}
          flags: >-
            --port=3030
            --cpu=2
            --memory=2Gi
            --min-instances=1
            --max-instances=5
            --concurrency=50
            --timeout=300
            --no-allow-unauthenticated
            --vpc-connector=${{ vars.VPC_CONNECTOR || '' }}
          env_vars: |
            NODE_ENV=production
            DOCKER_BUILD=0
            PORT=3030
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            DIRECT_URL=DIRECT_URL:latest
            NEXTAUTH_URL=NEXTAUTH_URL:latest
            SALT=SALT:latest
            ENCRYPTION_KEY=ENCRYPTION_KEY:latest
            CLICKHOUSE_URL=CLICKHOUSE_URL:latest
            CLICKHOUSE_MIGRATION_URL=CLICKHOUSE_MIGRATION_URL:latest
            CLICKHOUSE_USER=CLICKHOUSE_USER:latest
            CLICKHOUSE_PASSWORD=CLICKHOUSE_PASSWORD:latest
            REDIS_HOST=REDIS_HOST:latest
            REDIS_PORT=REDIS_PORT:latest
            REDIS_AUTH=REDIS_AUTH:latest
            LANGFUSE_S3_EVENT_UPLOAD_BUCKET=LANGFUSE_S3_EVENT_UPLOAD_BUCKET:latest
            LANGFUSE_S3_EVENT_UPLOAD_REGION=LANGFUSE_S3_EVENT_UPLOAD_REGION:latest
            LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID:latest
            LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY:latest
            LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT:latest
            LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=LANGFUSE_S3_MEDIA_UPLOAD_BUCKET:latest
            LANGFUSE_S3_MEDIA_UPLOAD_REGION=LANGFUSE_S3_MEDIA_UPLOAD_REGION:latest
            LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID:latest
            LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY:latest
            LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT:latest
